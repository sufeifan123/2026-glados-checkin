name: Keep Repository Active

# 每天 UTC 0:00 运行一次
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 【修改点 1】去掉前面的 .github/，直接写在根目录下
      - name: Update timestamp
        run: |
          echo "Last active: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" > last-active.txt

      # 【修改点 2】这里的 git add 路径也同步修改
      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last-active.txt
          git diff --staged --quiet || git commit -m "chore: keep repository active [skip ci]"
          git push
